<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Laundry App Pro</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f8ff;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: #0d6efd;
    color: white;
}

.navbar button {
    background: white;
    color: #0d6efd;
    border: none;
    padding: 8px 12px;
    margin-left: 10px;
    border-radius: 6px;
    cursor: pointer;
}

/* PAGE */
.page {
    display: none;
    padding: 40px;
    animation: fade 0.5s ease;
}

.active {
    display: block;
}

/* HERO */
.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(135deg,#0d6efd,#00c6ff);
    color: white;
    padding: 50px;
    border-radius: 12px;
}

.hero img {
    width: 200px;
    animation: float 3s infinite ease-in-out;
}

/* FORM */
.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    background: #0d6efd;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

/* TABLE */
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th {
    background: #0d6efd;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

.status-proses { color: orange; }
.status-selesai { color: green; }

/* ANIMATION */
@keyframes fade {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}

@keyframes float {
    0%,100% { transform: translateY(0);}
    50% { transform: translateY(-10px);}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <b>LaundryPro</b>
    <div>
        <button onclick="showPage('home')">Input</button>
        <button onclick="showPage('history')">History</button>
    </div>
</div>

<!-- PAGE 1 -->
<div id="home" class="page active">

    <div class="hero">
        <div>
            <h1>Laundry Cepat & Bersih</h1>
            <p>Kelola laundry dengan mudah</p>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/2920/2920222.png">
    </div>

    <div class="card">
        <h2>Input Transaksi</h2>

        <input id="nama" placeholder="Nama Pelanggan">

        <select id="layanan">
            <option value="7000">Cuci Kering</option>
            <option value="10000">Cuci Setrika</option>
            <option value="15000">Ekspres</option>
        </select>

        <input id="berat" type="number" placeholder="Berat (Kg)">

        <button onclick="tambah()">Tambah</button>
    </div>

</div>

<!-- PAGE 2 -->
<div id="history" class="page">

    <div class="card">
        <h2>Riwayat Transaksi</h2>

        <table>
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Layanan</th>
                    <th>Berat</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("laundry")) || [];

/* SWITCH PAGE */
function showPage(page) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
}

/* SAVE */
function simpan() {
    localStorage.setItem("laundry", JSON.stringify(data));
}

/* RENDER */
function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach((d, i) => {
        list.innerHTML += `
        <tr>
            <td>${d.nama}</td>
            <td>${d.layanan}</td>
            <td>${d.berat} Kg</td>
            <td>Rp ${d.total.toLocaleString('id-ID')}</td>
            <td class="${d.status=='Proses'?'status-proses':'status-selesai'}">${d.status}</td>
            <td>
                <button onclick="ubah(${i})">✔</button>
                <button onclick="hapus(${i})">❌</button>
            </td>
        </tr>`;
    });
}

/* TAMBAH */
function tambah() {
    const nama = document.getElementById("nama").value;
    const layananEl = document.getElementById("layanan");
    const harga = layananEl.value;
    const layanan = layananEl.options[layananEl.selectedIndex].text;
    const berat = document.getElementById("berat").value;

    if (!nama || !berat) {
        alert("Isi semua data!");
        return;
    }

    const total = harga * berat;

    data.push({
        nama,
        layanan,
        berat,
        total,
        status: "Proses"
    });

    simpan();
    render();

    document.getElementById("nama").value = "";
    document.getElementById("berat").value = "";
}

/* STATUS */
function ubah(i) {
    data[i].status = data[i].status === "Proses" ? "Selesai" : "Proses";
    simpan();
    render();
}

/* HAPUS */
function hapus(i) {
    data.splice(i, 1);
    simpan();
    render();
}

render();
</script>

</body>
</html>
