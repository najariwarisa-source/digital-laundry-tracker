<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Laundry App</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f7fb;
    margin: 0;
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 30px;
}

/* CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* INPUT */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #4facfe;
    color: white;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #4facfe;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

/* STATUS */
.status-proses { color: orange; font-weight: bold; }
.status-selesai { color: green; font-weight: bold; }

/* TOAST */
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #333;
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.3s;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h2>Input Transaksi</h2>

        <label>Nama</label>
        <input type="text" id="nama">

        <label>Layanan</label>
        <select id="layanan">
            <option value="7000">Cuci Kering</option>
            <option value="10000">Cuci Setrika</option>
            <option value="15000">Ekspres</option>
        </select>

        <label>Berat (Kg)</label>
        <input type="number" id="berat">

        <button onclick="tambah()">Tambah</button>
    </div>

    <div class="card">
        <h2>Transaksi</h2>

        <table>
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Layanan</th>
                    <th>Berat</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

</div>

<div id="toast" class="toast"></div>

<script>
let data = JSON.parse(localStorage.getItem("laundry")) || [];

function simpan() {
    localStorage.setItem("laundry", JSON.stringify(data));
}

function toast(pesan) {
    const t = document.getElementById("toast");
    t.innerText = pesan;
    t.classList.add("show");

    setTimeout(() => {
        t.classList.remove("show");
    }, 2000);
}

function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach((item, i) => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${item.nama}</td>
            <td>${item.layanan}</td>
            <td>${item.berat} Kg</td>
            <td>Rp ${item.total.toLocaleString('id-ID')}</td>
            <td class="${item.status === 'Proses' ? 'status-proses' : 'status-selesai'}">
                ${item.status}
            </td>
            <td>
                <button onclick="ubahStatus(${i})">✔</button>
                <button onclick="hapus(${i})">❌</button>
            </td>
        `;

        list.appendChild(row);
    });
}

function tambah() {
    const nama = document.getElementById("nama").value;
    const layananEl = document.getElementById("layanan");
    const harga = layananEl.value;
    const layanan = layananEl.options[layananEl.selectedIndex].text;
    const berat = document.getElementById("berat").value;

    if (!nama || !berat) {
        toast("Isi semua data!");
        return;
    }

    const total = harga * berat;

    data.push({
        nama,
        layanan,
        berat,
        total,
        status: "Proses"
    });

    simpan();
    render();
    toast("Transaksi ditambahkan!");

    document.getElementById("nama").value = "";
    document.getElementById("berat").value = "";
}

function ubahStatus(i) {
    data[i].status = data[i].status === "Proses" ? "Selesai" : "Proses";
    simpan();
    render();
    toast("Status diubah!");
}

function hapus(i) {
    data.splice(i, 1);
    simpan();
    render();
    toast("Data dihapus!");
}

render();
</script>

</body>
</html>
