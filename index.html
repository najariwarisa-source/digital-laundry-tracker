<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Laundry App Pro</title>

<style>
body {
    font-family: sans-serif;
    background: #f4f7fb;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
}

button {
    background: #4facfe;
    color: white;
    border: none;
}

table {
    width: 100%;
}

th {
    background: #4facfe;
    color: white;
}
</style>

<!-- FIREBASE MODERN -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ISI_API_KEY",
  authDomain: "ISI_DOMAIN",
  projectId: "ISI_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// LOGIN
window.login = async function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        await signInWithEmailAndPassword(auth, email, password);
        alert("Login berhasil!");
    } catch (e) {
        alert(e.message);
    }
}

// TAMBAH DATA
window.tambah = async function() {
    const nama = document.getElementById("nama").value;
    const layanan = document.getElementById("layanan").value;
    const berat = document.getElementById("berat").value;

    if (!nama || !berat) {
        alert("Isi semua!");
        return;
    }

    await addDoc(collection(db, "transaksi"), {
        nama,
        layanan,
        berat,
        total: layanan * berat
    });

    alert("Data masuk!");
}

// LOAD DATA
onSnapshot(collection(db, "transaksi"), (snapshot) => {
    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(doc => {
        const d = doc.data();

        list.innerHTML += `
            <tr>
                <td>${d.nama}</td>
                <td>${d.layanan}</td>
                <td>${d.berat}</td>
                <td>Rp ${d.total}</td>
            </tr>
        `;
    });
});
</script>

</head>

<body>

<div class="container">

<div class="card">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="card">
<h2>Tambah Transaksi</h2>
<input id="nama" placeholder="Nama">
<select id="layanan">
<option value="7000">Cuci Kering</option>
<option value="10000">Cuci Setrika</option>
</select>
<input id="berat" type="number" placeholder="Kg">
<button onclick="tambah()">Tambah</button>
</div>

<div class="card">
<h2>Data</h2>
<table>
<thead>
<tr>
<th>Nama</th>
<th>Layanan</th>
<th>Berat</th>
<th>Total</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

</div>

</body>
</html>
